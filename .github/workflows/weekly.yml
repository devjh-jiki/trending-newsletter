name: Weekly newsletter

# 매주 일요일 오전 9시 30분 KST 에 GitHub Trending(weekly) 을 수집해
# 한글 요약 뉴스레터를 생성하고 archive/weekly 에 커밋한다.
# 요약은 Anthropic(Claude) 공식 API 를 사용한다. (ANTHROPIC_API_KEY 시크릿 필요)

on:
  workflow_dispatch: {}
  schedule:
    # 09:30 KST = 00:30 UTC, 일요일 (0)
    # GitHub Actions schedule 은 UTC 기준이며 정시 실행을 보장하지 않는다.
    # 30분에 등록해 부하 피크(정각)를 피한다.
    - cron: "30 0 * * 0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate newsletter
        env:
          # Anthropic(Claude) 공식 API
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
          # 디스코드 #newsletter 발송
          DISCORD_WEBHOOK_NEWSLETTER: ${{ secrets.DISCORD_WEBHOOK_NEWSLETTER }}
          SINCE: weekly
          LIMIT: "15"
        run: node src/index.mjs
      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ || true
          git diff --cached --quiet || git commit -m "chore: $(date +%F) 주간 뉴스레터 아카이브"
          git push || true
