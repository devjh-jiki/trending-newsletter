name: Daily newsletter

# 매일 GitHub Trending 을 수집해 한글 번역·요약 뉴스레터를 생성한다.
# 처음에는 수동 트리거로 검증 후 schedule 을 활성화하세요.

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 23 * * *"  # 매일 08:00 KST (UTC+9)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE: daily
          LIMIT: "10"
        run: node src/index.mjs
      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ || true
          git diff --cached --quiet || git commit -m "chore: $(date +%F) 뉴스레터 아카이브"
          git push || true
